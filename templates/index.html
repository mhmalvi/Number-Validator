<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Number Validator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --success-color: #4bb543;
            --warning-color: #f72585;
        }

        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding-top: 50px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .validation-form {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .validation-form:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(67, 97, 238, 0.25);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .result-card {
            display: none;
            margin-top: 30px;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card {
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .card-title {
            color: var(--primary-color);
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            color: var(--primary-color);
        }

        .list-group-item {
            padding: 15px;
            border-left: 4px solid var(--primary-color);
            margin-bottom: 8px;
            border-radius: 8px !important;
            background-color: #f8f9fa;
        }

        .alert {
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .alert-success {
            background-color: rgba(75, 181, 67, 0.1);
            border-color: var(--success-color);
            color: var(--success-color);
        }

        .alert-warning {
            background-color: rgba(247, 37, 133, 0.1);
            border-color: var(--warning-color);
            color: var(--warning-color);
        }

        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }

        .page-title {
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group-text {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-right: none;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }

        .input-icon input {
            padding-left: 40px;
        }

        /* Animation classes */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="validation-form">
                    <h2 class="text-center page-title">
                        <i class="fas fa-phone-alt me-2"></i>
                        Phone Number Validator
                    </h2>
                    <form id="validationForm">
                        <div class="mb-4">
                            <label for="phone_number" class="form-label">
                                <i class="fas fa-mobile-alt me-2"></i>Phone Number
                            </label>
                            <div class="input-icon">
                                <input type="tel" 
                                       class="form-control" 
                                       id="phone_number" 
                                       name="phone_number" 
                                       placeholder="Enter phone number..."
                                       required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="country_code" class="form-label">
                                <i class="fas fa-globe me-2"></i>Country Code
                            </label>
                            <div class="input-icon">
                                <input type="text" 
                                       class="form-control" 
                                       id="country_code" 
                                       name="country_code" 
                                       value="US"
                                       placeholder="Enter country code...">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-check-circle me-2"></i>Validate Number
                        </button>
                    </form>

                    <div class="loading">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-3 text-muted">Validating number...</p>
                    </div>

                    <div class="result-card fade-in">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">
                                    <i class="fas fa-clipboard-check me-2"></i>
                                    Validation Results
                                </h5>
                                <div id="validationResults"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // Add input mask for phone number
            $('#phone_number').on('input', function() {
                let number = $(this).val().replace(/\D/g, '');
                if (number.length > 10) {
                    number = number.substr(0, 10);
                }
                $(this).val(number.replace(/(\d{3})(\d{3})(\d{4})/, '($1) $2-$3'));
            });

            $('#validationForm').on('submit', function(e) {
                e.preventDefault();
                
                $('.loading').fadeIn();
                $('.result-card').fadeOut();
                
                $.ajax({
                    url: '/validate',
                    method: 'POST',
                    data: $(this).serialize(),
                    success: function(response) {
                        $('.loading').fadeOut();
                        
                        let resultsHtml = '';
                        if (response.error) {
                            resultsHtml = `
                                <div class="alert alert-danger">
                                    <i class="fas fa-exclamation-circle me-2"></i>
                                    ${response.error}
                                </div>`;
                        } else {
                            resultsHtml = `
                                <div class="alert ${response.valid ? 'alert-success' : 'alert-warning'}">
                                    <i class="fas ${response.valid ? 'fa-check-circle' : 'fa-exclamation-triangle'} me-2"></i>
                                    <strong>Valid:</strong> ${response.valid ? 'Yes' : 'No'}
                                </div>
                            `;
                            
                            if (response.valid) {
                                resultsHtml += `
                                    <ul class="list-group">
                                        <li class="list-group-item">
                                            <i class="fas fa-phone me-2"></i>
                                            <strong>International Format:</strong> ${response.international_format || 'N/A'}
                                        </li>
                                        <li class="list-group-item">
                                            <i class="fas fa-flag me-2"></i>
                                            <strong>Country:</strong> ${response.country_name || 'N/A'}
                                        </li>
                                        <li class="list-group-item">
                                            <i class="fas fa-map-marker-alt me-2"></i>
                                            <strong>Location:</strong> ${response.location || 'N/A'}
                                        </li>
                                        <li class="list-group-item">
                                            <i class="fas fa-building me-2"></i>
                                            <strong>Carrier:</strong> ${response.carrier || 'N/A'}
                                        </li>
                                        <li class="list-group-item">
                                            <i class="fas fa-network-wired me-2"></i>
                                            <strong>Line Type:</strong> ${response.line_type || 'N/A'}
                                        </li>
                                    </ul>
                                `;
                            }
                        }
                        
                        $('#validationResults').html(resultsHtml);
                        $('.result-card').fadeIn();
                    },
                    error: function() {
                        $('.loading').fadeOut();
                        $('.result-card').fadeIn();
                        $('#validationResults').html(`
                            <div class="alert alert-danger">
                                <i class="fas fa-times-circle me-2"></i>
                                An error occurred while validating the phone number.
                            </div>
                        `);
                    }
                });
            });
        });
    </script>
</body>
</html>
